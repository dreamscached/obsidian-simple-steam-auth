name: Build and draft a release on tag push to master

on:
  push:
    tags:
      - '*'

jobs:
  build:
    name: Build and draft release
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run build
        run: yarn build

      - id: package-metadata
        name: Extract project name and version
        run: |
          echo "name=$(jq -r .id manifest.json)" >> "$GITHUB_OUTPUT"
          echo "version=$(jq -r .version manifest.json)" >> "$GITHUB_OUTPUT"

      - name: Upload to Draft Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          fail_on_unmatched_files: true
          files: |
            dist/main.js
            dist/manifest.json

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: 'dist/*'
